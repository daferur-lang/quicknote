<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="QuickNote — Notas ultrarrápidas y visuales">
  <title>QuickNote ⚡</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* ── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:         #f0f2f5;
      --surface:    #ffffff;
      --text:       #1a1a2e;
      --muted:      #6b7280;
      --border:     rgba(0,0,0,.08);
      --shadow:     0 2px 8px rgba(0,0,0,.08);
      --shadow-lg:  0 8px 28px rgba(0,0,0,.15);
      --radius:     16px;
      --header:     #ffffffee;
      --pill:       #f0f2f5;
      --accent:     #6c63ff;
      --accent-glow:rgba(108,99,255,.35);
      --toast-bg:   #1a1a2e;
      --cn-default: #ffffff;
      --cn-yellow:  #fff740;
      --cn-pink:    #ffb3d9;
      --cn-red:     #ffadad;
      --cn-green:   #b5ead7;
      --cn-blue:    #aecbfa;
      --cn-purple:  #d0bfff;
      --cn-orange:  #ffd6a5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #0f1117;
        --surface:   #1c1f27;
        --text:      #f1f3f9;
        --muted:     #8b92a5;
        --border:    rgba(255,255,255,.07);
        --shadow:    0 2px 8px rgba(0,0,0,.4);
        --shadow-lg: 0 8px 28px rgba(0,0,0,.6);
        --header:    #1c1f27ee;
        --pill:      #252932;
        --accent:    #7c6fff;
        --toast-bg:  #252932;
        --cn-default: #252932;
        --cn-yellow:  #4a4100;
        --cn-pink:    #5c1f40;
        --cn-red:     #5c1c1c;
        --cn-green:   #0e4a30;
        --cn-blue:    #0e3060;
        --cn-purple:  #2e2470;
        --cn-orange:  #5c3600;
      }
    }

    /* ── RESET ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overscroll-behavior: none;
    }
    button { font-family: inherit; cursor: pointer; }
    input, textarea { font-family: inherit; }
    input[type="search"]::-webkit-search-cancel-button { display: none; }

    /* ── NOTE COLOR CLASSES ──────────────────────────────── */
    .nc-default { background: var(--cn-default); }
    .nc-yellow  { background: var(--cn-yellow); }
    .nc-pink    { background: var(--cn-pink); }
    .nc-red     { background: var(--cn-red); }
    .nc-green   { background: var(--cn-green); }
    .nc-blue    { background: var(--cn-blue); }
    .nc-purple  { background: var(--cn-purple); }
    .nc-orange  { background: var(--cn-orange); }

    /* ── HEADER ──────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--header);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .logo {
      font-size: 1.4rem; font-weight: 800; white-space: nowrap;
      background: linear-gradient(135deg, var(--accent), #ff6b9d);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .search-wrap { flex: 1; position: relative; }
    .search-ico {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      font-size: .9rem; color: var(--muted); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 9px 14px 9px 34px;
      border: 1.5px solid transparent; border-radius: 100px;
      background: var(--pill); color: var(--text); font-size: .9rem; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); font-size: 1rem; display: none;
    }
    .search-input:not(:placeholder-shown) ~ .search-clear { display: block; }

    .sort-wrap { position: relative; }
    .sort-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 8px 13px; border-radius: 100px;
      border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text);
      font-size: .82rem; font-weight: 600; white-space: nowrap;
    }
    .sort-menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; box-shadow: var(--shadow-lg);
      min-width: 190px; overflow: hidden; z-index: 200; display: none;
    }
    .sort-menu.open { display: block; }
    .sort-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; background: none; border: none;
      color: var(--text); font-size: .88rem; width: 100%; text-align: left;
      transition: background .15s;
    }
    .sort-item:hover { background: var(--pill); }
    .sort-item.active { color: var(--accent); font-weight: 700; }

    /* ── TABS ────────────────────────────────────────────── */
    .tabs { display: flex; gap: 6px; padding: 10px 16px 4px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 6px 16px; border-radius: 100px;
      border: 1.5px solid var(--border);
      background: transparent; color: var(--muted);
      font-size: .83rem; font-weight: 600; white-space: nowrap; transition: all .2s;
    }
    .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ── CATEGORY CHIPS ──────────────────────────────────── */
    .cats { display: flex; gap: 6px; padding: 6px 16px 8px; overflow-x: auto; scrollbar-width: none; }
    .cats::-webkit-scrollbar { display: none; }
    .cat-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 13px; border-radius: 100px;
      border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text);
      font-size: .82rem; white-space: nowrap; transition: all .2s;
    }
    .cat-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── QUICK CREATE ────────────────────────────────────── */
    .qc-wrap {
      margin: 10px 16px 14px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: box-shadow .2s;
    }
    .qc-wrap:focus-within { box-shadow: var(--shadow-lg); }
    .qc-placeholder {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px; color: var(--muted); cursor: text;
    }
    .qc-placeholder span { font-size: .95rem; }
    .qc-ph-icons { display: flex; gap: 8px; }
    .qc-ph-btn {
      background: none; border: none; font-size: 1.1rem;
      color: var(--muted); padding: 4px; border-radius: 8px; transition: background .15s;
    }
    .qc-ph-btn:hover { background: var(--border); }
    .qc-form { display: none; flex-direction: column; }
    .qc-form.open { display: flex; }
    .qc-title-input {
      padding: 13px 16px 4px; border: none; background: transparent; color: var(--text);
      font-size: 1rem; font-weight: 700; outline: none; width: 100%;
    }
    .qc-title-input::placeholder { color: var(--muted); font-weight: 400; }
    .qc-body-input {
      padding: 4px 16px 12px; border: none; background: transparent; color: var(--text);
      font-size: .93rem; outline: none; width: 100%; resize: none; min-height: 72px; line-height: 1.55;
    }
    .qc-body-input::placeholder { color: var(--muted); }
    .qc-checklist { padding: 4px 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .check-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
    .check-row input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
    .check-row .item-input {
      flex: 1; border: none; border-bottom: 1px solid var(--border);
      background: transparent; color: var(--text); font-size: .93rem; outline: none; padding: 3px 0;
    }
    .check-row .item-del {
      background: none; border: none; color: var(--muted);
      font-size: .9rem; padding: 2px 5px; border-radius: 6px; transition: background .15s;
    }
    .check-row .item-del:hover { background: var(--border); }
    .add-item-row {
      display: flex; align-items: center; gap: 8px;
      color: var(--muted); font-size: .88rem; cursor: pointer; padding: 5px 0;
    }
    .qc-toolbar {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 8px; padding: 8px 14px; border-top: 1px solid var(--border); background: var(--pill);
    }
    .color-row { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }
    .c-dot {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2.5px solid transparent; cursor: pointer;
      transition: transform .15s, border-color .15s; flex-shrink: 0;
    }
    .c-dot:hover { transform: scale(1.2); }
    .c-dot.sel { border-color: var(--text); transform: scale(1.15); }
    .cat-row { display: flex; gap: 3px; }
    .ce-btn {
      font-size: 1rem; padding: 2px 4px; border-radius: 6px;
      border: 2px solid transparent; background: none; cursor: pointer; transition: background .15s, border-color .15s;
    }
    .ce-btn:hover { background: var(--border); }
    .ce-btn.sel { border-color: var(--accent); background: rgba(108,99,255,.15); }
    .type-toggle {
      padding: 6px 11px; border-radius: 9px; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text); font-size: .8rem; font-weight: 600;
    }
    .save-btn {
      padding: 7px 18px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-size: .88rem; font-weight: 700; transition: opacity .2s;
    }
    .save-btn:hover { opacity: .88; }

    /* ── NOTES GRID ──────────────────────────────────────── */
    .section-label {
      padding: 2px 16px 8px; font-size: .72rem; font-weight: 800;
      letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
    }
    .notes-grid { padding: 0 16px; columns: 2 220px; column-gap: 12px; }
    .note-card {
      break-inside: avoid; margin-bottom: 12px; border-radius: 14px; padding: 14px;
      border: 1.5px solid var(--border); cursor: pointer; position: relative;
      animation: pop .25s ease; transition: transform .2s, box-shadow .2s;
    }
    .note-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    @keyframes pop {
      from { opacity: 0; transform: scale(.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .note-pin-badge { position: absolute; top: 10px; right: 12px; font-size: .8rem; opacity: .7; }
    .note-title { font-size: .97rem; font-weight: 700; margin-bottom: 7px; word-break: break-word; }
    .note-content { font-size: .84rem; line-height: 1.55; opacity: .85; word-break: break-word; white-space: pre-wrap; }
    .note-checklist { display: flex; flex-direction: column; gap: 4px; }
    .note-ci { display: flex; align-items: flex-start; gap: 7px; font-size: .84rem; opacity: .85; }
    .note-ci input[type="checkbox"] { margin-top: 2px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .note-ci span.done { text-decoration: line-through; opacity: .5; }
    .note-more { font-size: .75rem; opacity: .5; padding-top: 4px; }
    .note-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px; opacity: 0; transition: opacity .2s;
    }
    .note-card:hover .note-footer { opacity: 1; }
    .note-cat-badge { font-size: .9rem; }
    .note-date { font-size: .72rem; opacity: .55; }
    .note-acts { display: flex; gap: 3px; }
    .note-act-btn {
      background: rgba(0,0,0,.07); border: none; border-radius: 7px;
      padding: 3px 7px; font-size: .78rem; color: inherit; transition: background .15s;
    }
    .note-act-btn:hover { background: rgba(0,0,0,.14); }

    /* ── FAB ─────────────────────────────────────────────── */
    .fab {
      position: fixed; bottom: 22px; right: 20px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent); color: #fff; border: none; font-size: 1.6rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 18px var(--accent-glow); z-index: 80;
      transition: transform .2s, box-shadow .2s;
    }
    .fab:hover { transform: scale(1.1); box-shadow: 0 6px 24px var(--accent-glow); }

    /* ── EMPTY STATE ─────────────────────────────────────── */
    .empty { text-align: center; padding: 64px 24px; color: var(--muted); display: none; }
    .empty .big { font-size: 3.5rem; margin-bottom: 14px; }
    .empty h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .empty p { font-size: .88rem; }

    /* ── TOAST ───────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 88px; left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: var(--toast-bg); color: #fff;
      padding: 10px 22px; border-radius: 100px;
      font-size: .88rem; font-weight: 600;
      z-index: 500; opacity: 0; pointer-events: none; white-space: nowrap;
      transition: opacity .25s, transform .25s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── EDIT MODAL ──────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      z-index: 300; display: none; align-items: center; justify-content: center;
      padding: 20px; animation: fadeOv .2s ease;
    }
    .overlay.open { display: flex; }
    @keyframes fadeOv { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto;
      border-radius: var(--radius); border: 1.5px solid var(--border);
      box-shadow: var(--shadow-lg); animation: slideModal .25s ease;
    }
    @keyframes slideModal {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .modal-head { display: flex; align-items: center; gap: 8px; padding: 16px 16px 8px; }
    .modal-title-input {
      flex: 1; border: none; background: transparent;
      color: inherit; font-size: 1.05rem; font-weight: 700; outline: none;
    }
    .modal-title-input::placeholder { color: var(--muted); font-weight: 400; }
    .modal-pin-btn { background: none; border: none; font-size: 1.2rem; opacity: .35; transition: opacity .2s; padding: 4px; }
    .modal-pin-btn.on { opacity: 1; }
    .modal-body { padding: 4px 16px 12px; }
    .modal-textarea {
      width: 100%; min-height: 110px; border: none; background: transparent; color: inherit;
      font-size: .93rem; line-height: 1.6; outline: none; resize: none;
    }
    .modal-textarea::placeholder { color: var(--muted); }
    .modal-checklist { display: flex; flex-direction: column; gap: 6px; }
    .modal-toolbar { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--border); }
    .modal-footer { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border); }
    .modal-del-btn { background: rgba(239,68,68,.12); color: #ef4444; border: none; border-radius: 9px; padding: 7px 14px; font-size: .86rem; font-weight: 600; }
    .modal-arch-btn { background: var(--pill); color: var(--text); border: none; border-radius: 9px; padding: 7px 14px; font-size: .86rem; }
    .modal-save-btn { background: var(--accent); color: #fff; border: none; border-radius: 9px; padding: 7px 20px; font-size: .88rem; font-weight: 700; }
    .modal-save-btn:hover { opacity: .88; }

    /* ── MISC ────────────────────────────────────────────── */
    .pinned-section { display: none; }
    .bottom-space { height: 88px; }

    /* ── CALENDAR ────────────────────────────────────────── */
    .cal-panel {
      margin: 0 16px 16px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); overflow: hidden; display: none;
    }
    .cal-header {
      display: flex; align-items: center; gap: 6px;
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      min-width: 0;
    }
    .cal-nav-btn {
      background: var(--pill); border: none; border-radius: 8px;
      padding: 6px 10px; font-size: 1.1rem; color: var(--text); cursor: pointer;
      transition: background .15s; line-height: 1; flex-shrink: 0;
    }
    .cal-nav-btn:hover { background: var(--border); }
    .cal-title { flex: 1; text-align: center; font-size: .88rem; font-weight: 700; text-transform: capitalize; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cal-view-toggle { display: flex; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
    .cal-view-btn { background: none; border: none; padding: 5px 10px; font-size: .75rem; color: var(--muted); cursor: pointer; transition: all .15s; }
    .cal-view-btn.active { background: var(--accent); color: white; }

    /* Month grid */
    .cal-dow { display: grid; grid-template-columns: repeat(7,1fr); padding: 8px 10px 2px; gap: 2px; }
    .cal-dow-cell { text-align: center; font-size: .68rem; font-weight: 800; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; padding: 4px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; padding: 4px 10px 12px; }
    .cal-day {
      aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start; padding: 5px 2px 3px;
      cursor: pointer; transition: background .15s; position: relative; overflow: hidden;
    }
    .cal-day:hover:not(.other-month) { background: var(--pill); }
    .cal-day.other-month { opacity: .25; pointer-events: none; }
    .cal-day.today .cal-day-num {
      background: var(--accent); color: white;
      border-radius: 50%; width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-day.has-notes { cursor: pointer; }
    .cal-day-num { font-size: .85rem; font-weight: 600; line-height: 1; margin-bottom: 3px; }
    .cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
    .cal-dot {
      width: 7px; height: 7px; border-radius: 50%;
      border: 1px solid rgba(0,0,0,.1);
    }
    .cal-dot-more { font-size: .55rem; color: var(--muted); line-height: 1; }

    /* Week grid */
    .cal-week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; padding: 12px; }
    .cal-week-day {
      border-radius: 12px; padding: 10px 6px 8px; min-height: 100px;
      background: var(--pill); cursor: pointer;
      border: 1.5px solid transparent;
      transition: background .15s, transform .15s, border-color .15s;
    }
    .cal-week-day:hover { background: var(--border); transform: translateY(-2px); }
    .cal-week-day.today { border-color: var(--accent); }
    .cal-week-day.has-notes { background: var(--surface); box-shadow: var(--shadow); }
    .cal-week-head { display: flex; flex-direction: column; align-items: center; margin-bottom: 8px; }
    .cal-week-dname { font-size: .63rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .cal-week-dnum { font-size: 1.1rem; font-weight: 800; }
    .today .cal-week-dnum { color: var(--accent); }
    .cal-note-pill {
      border-radius: 6px; padding: 3px 6px; font-size: .65rem; font-weight: 600;
      margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      border: 1px solid rgba(0,0,0,.08);
    }
    .cal-week-notes { display: flex; flex-direction: column; }
    .cal-week-more { font-size: .63rem; color: var(--muted); margin-top: 2px; text-align: center; }

    /* Day header (back button when viewing day notes) */
    .day-header {
      display: none; align-items: center; gap: 10px;
      padding: 8px 16px 4px;
    }
    .day-back-btn {
      background: var(--pill); border: none; border-radius: 100px;
      padding: 6px 14px; color: var(--text); font-size: .82rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: background .15s;
    }
    .day-back-btn:hover { background: var(--border); }
    .day-header-title { font-weight: 700; font-size: .95rem; color: var(--text); }

    /* ── VOICE ───────────────────────────────────────────── */
    .mic-btn {
      background: none; border: none; font-size: 1.15rem; color: var(--muted);
      padding: 4px; border-radius: 8px; transition: background .15s, color .15s;
      display: none;
    }
    .mic-btn:hover { background: var(--border); }
    .mic-btn.recording { color: #ef4444; animation: micpulse 1s infinite; }
    @keyframes micpulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(1.15); }
    }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 440px) {
      .header { padding: 8px 12px; }
      .notes-grid { padding: 0 12px; columns: 1; }
      .qc-wrap { margin: 8px 12px 12px; }
      .section-label, .cal-panel, .day-header { margin-left: 0; margin-right: 0; }
      .tabs, .cats { padding-left: 12px; }
      .cal-week-grid { gap: 3px; padding: 8px; }
      .cal-week-day { padding: 7px 3px 6px; min-height: 80px; }
      .cal-week-dname { font-size: .58rem; }
      .cal-week-dnum { font-size: .95rem; }
      .cal-note-pill { font-size: .58rem; padding: 2px 4px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">⚡ QuickNote</div>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input class="search-input" type="search" id="searchInput" placeholder="Buscar notas...">
    <button class="search-clear" id="searchClear">✕</button>
  </div>
  <div class="sort-wrap">
    <button class="sort-btn" id="sortBtn">↕ <span id="sortLabel">Recientes</span></button>
    <div class="sort-menu" id="sortMenu">
      <button class="sort-item active" data-sort="updatedAt">🕒 Más recientes</button>
      <button class="sort-item" data-sort="createdAt">📅 Fecha creación</button>
      <button class="sort-item" data-sort="color">🎨 Por color</button>

<!-- DAY HEADER (shown when viewing a specific day from calendar) -->

<div class="qc-wrap" id="qcWrap">
  <div class="qc-placeholder" id="qcPlaceholder">

    <div class="qc-ph-icons">
      <button class="qc-ph-btn mic-btn" id="voiceMicBtn" title="Nota de voz">🎤</button>

  </div>

      <div class="color-row" id="qcColors"></div>
      <div class="cat-row" id="qcCats"></div>
      <button class="type-toggle" id="qcTypeToggle">☑️ Lista</button>
      <button class="save-btn" id="qcSaveBtn">Guardar</button>

</div>

<!-- PINNED SECTION -->
<div class="pinned-section" id="pinnedSection">

</div>

<!-- MAIN GRID -->

<!-- EMPTY STATE -->

<!-- FAB -->

      <div class="color-row" id="modalColors"></div>
      <div class="cat-row" id="modalCats"></div>

      <button class="modal-save-btn" id="modalSaveBtn">Guardar</button>

<script>
// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const COLORS = [
  { id: 'default', dot: '#e5e7eb', dotDark: '#374151' },
  { id: 'yellow',  dot: '#fff740' },
  { id: 'pink',    dot: '#ffb3d9' },
  { id: 'red',     dot: '#ffadad' },
  { id: 'green',   dot: '#b5ead7' },
  { id: 'blue',    dot: '#aecbfa' },
  { id: 'purple',  dot: '#d0bfff' },
  { id: 'orange',  dot: '#ffd6a5' },
];
const CATS = ['📝','💡','🛒','📚','💼','🏠','❤️','🎯'];
const DAY_NAMES_LONG = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let notes = [];
let tab    = 'today';
let cat    = 'all';
let sort   = 'updatedAt';
let editId = null;

// Quick-create
let qcType  = 'text';
let qcColor = 'default';
let qcCat   = '📝';
let qcItems = [{text:'', checked:false}];

// Modal
let mType   = 'text';
let mColor  = 'default';
let mCat    = '📝';
let mPinned = false;
let mItems  = [];

// Calendar
let calDate        = new Date();
let calSelectedDay = null;  // "YYYY-MM-DD" or null
let calViewMode    = 'month'; // 'month' | 'week'

// Voice
let voiceActive      = false;
let recognition      = null;
let voiceSilenceTimer = null;
let voiceAccumulated = '';

// ═══════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════
function load() {
  try { notes = JSON.parse(localStorage.getItem('qn_v2') || '[]'); }
  catch { notes = []; }
}
function save() {
  try { localStorage.setItem('qn_v2', JSON.stringify(notes)); }
  catch {}
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ═══════════════════════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════════════════════
function toDateKey(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function notesOnDay(dateKey) {
  return notes.filter(n => !n.archived &&
    (toDateKey(n.createdAt) === dateKey || toDateKey(n.updatedAt) === dateKey));
}

function fmtDayLong(dateKey) {
  const [y,m,d] = dateKey.split('-').map(Number);
  const date = new Date(y, m-1, d);
  return `${DAY_NAMES_LONG[date.getDay()]} ${d} de ${MONTH_NAMES[m-1]}`;
}

// ═══════════════════════════════════════════════════════════
// FILTER & SORT
// ═══════════════════════════════════════════════════════════
function filtered() {
  let out;

  if (tab === 'calendar' && calSelectedDay) {
    out = notesOnDay(calSelectedDay);
  } else {
    const todayStr = new Date().toDateString();
    out = notes.filter(n => {
      if (tab === 'archived') return n.archived;
      if (n.archived) return false;
      if (tab === 'today') {
        return new Date(n.createdAt).toDateString() === todayStr
            || new Date(n.updatedAt).toDateString() === todayStr;
      }
      return true;
    });
  }

  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (q) out = out.filter(n => {
    const txt = [n.title, n.content, ...(n.items||[]).map(i=>i.text)].join(' ').toLowerCase();
    return txt.includes(q);
  });

  if (cat !== 'all') out = out.filter(n => n.cat === cat);

  out.sort((a, b) => {
    if (sort === 'pinned')    return (b.pinned?1:0) - (a.pinned?1:0) || b.updatedAt - a.updatedAt;
    if (sort === 'color')     return (a.color||'').localeCompare(b.color||'') || b.updatedAt - a.updatedAt;
    if (sort === 'createdAt') return b.createdAt - a.createdAt;
    return b.updatedAt - a.updatedAt;
  });

  return out;
}

// ═══════════════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════════════
function isDark() { return matchMedia('(prefers-color-scheme: dark)').matches; }

function buildColorDots(container, current, onChange) {
  container.innerHTML = '';
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'c-dot' + (c.id === current ? ' sel' : '');
    d.style.background = isDark() ? (c.dotDark || c.dot) : c.dot;
    if (c.id === 'default') d.style.border = '2px solid var(--border)';
    d.title = c.id;
    d.onclick = () => onChange(c.id);
    container.appendChild(d);
  });
}

function buildCatEmojis(container, current, onChange) {
  container.innerHTML = '';
  CATS.forEach(e => {
    const b = document.createElement('button');
    b.className = 'ce-btn' + (e === current ? ' sel' : '');
    b.textContent = e;
    b.onclick = () => onChange(e);
    container.appendChild(b);
  });
}

function buildChecklist(container, items) {
  container.innerHTML = '';
  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'check-row';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = item.checked;
    cb.onchange = () => { items[i].checked = cb.checked; };
    const inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'item-input';
    inp.placeholder = 'Elemento...'; inp.value = item.text;
    inp.oninput = () => { items[i].text = inp.value; };
    inp.onkeydown = e => {
      if (e.key === 'Enter') {
        items.splice(i+1, 0, {text:'', checked:false});
        buildChecklist(container, items);
        setTimeout(() => container.querySelectorAll('.item-input')[i+1]?.focus(), 0);
      }
      if (e.key === 'Backspace' && inp.value === '' && items.length > 1) {
        items.splice(i, 1);
        buildChecklist(container, items);
        setTimeout(() => container.querySelectorAll('.item-input')[Math.max(0,i-1)]?.focus(), 0);
      }
    };
    const del = document.createElement('button');
    del.className = 'item-del'; del.textContent = '×';
    del.onclick = () => { if (items.length > 1) { items.splice(i,1); buildChecklist(container,items); } };
    row.append(cb, inp, del);
    container.appendChild(row);
  });
  const addRow = document.createElement('div');
  addRow.className = 'add-item-row';
  addRow.innerHTML = '<span>➕</span><span>Añadir elemento</span>';
  addRow.onclick = () => {
    items.push({text:'', checked:false});
    buildChecklist(container, items);
    setTimeout(() => { const ins = container.querySelectorAll('.item-input'); ins[ins.length-1]?.focus(); }, 0);
  };
  container.appendChild(addRow);
}

function fmtDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('es', {day:'numeric', month:'short'});
}

// ═══════════════════════════════════════════════════════════
// BUILD NOTE CARD
// ═══════════════════════════════════════════════════════════
function buildCard(note) {
  const card = document.createElement('div');
  card.className = `note-card nc-${note.color || 'default'}`;
  if (note.pinned) {
    const pin = document.createElement('span');
    pin.className = 'note-pin-badge'; pin.textContent = '📌';
    card.appendChild(pin);
  }
  if (note.title) {
    const h = document.createElement('div');
    h.className = 'note-title'; h.textContent = note.title;
    card.appendChild(h);
  }
  if (note.type === 'checklist' && note.items?.length) {
    const list = document.createElement('div'); list.className = 'note-checklist';
    const MAX = 6;
    note.items.slice(0, MAX).forEach((item, i) => {
      const row = document.createElement('div'); row.className = 'note-ci';
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.checked = item.checked;
      cb.onclick = e => {
        e.stopPropagation();
        note.items[i].checked = !note.items[i].checked;
        note.updatedAt = Date.now(); save(); renderAll();
      };
      const sp = document.createElement('span');
      sp.textContent = item.text;
      if (item.checked) sp.classList.add('done');
      row.append(cb, sp); list.appendChild(row);
    });
    if (note.items.length > MAX) {
      const more = document.createElement('div');
      more.className = 'note-more';
      more.textContent = `+${note.items.length - MAX} más`;
      list.appendChild(more);
    }
    card.appendChild(list);
  } else if (note.content) {
    const body = document.createElement('div'); body.className = 'note-content';
    const lines = note.content.split('\n');
    body.textContent = lines.slice(0, 7).join('\n') + (lines.length > 7 ? '\n…' : '');
    card.appendChild(body);
  }
  const footer = document.createElement('div'); footer.className = 'note-footer';
  const left = document.createElement('div');
  left.style.cssText = 'display:flex;align-items:center;gap:8px';
  const catBadge = document.createElement('span');
  catBadge.className = 'note-cat-badge'; catBadge.textContent = note.cat || '📝';
  const dateSpan = document.createElement('span');
  dateSpan.className = 'note-date'; dateSpan.textContent = fmtDate(note.updatedAt);
  left.append(catBadge, dateSpan);
  const acts = document.createElement('div'); acts.className = 'note-acts';
  const pinBtn = document.createElement('button');
  pinBtn.className = 'note-act-btn'; pinBtn.title = note.pinned ? 'Desfijar' : 'Fijar';
  pinBtn.textContent = note.pinned ? '📍' : '📌';
  pinBtn.onclick = e => {
    e.stopPropagation(); note.pinned = !note.pinned; note.updatedAt = Date.now();
    save(); renderAll(); toast(note.pinned ? 'Nota fijada 📌' : 'Nota desfijada');
  };
  const archBtn = document.createElement('button');
  archBtn.className = 'note-act-btn'; archBtn.title = note.archived ? 'Restaurar' : 'Archivar';
  archBtn.textContent = note.archived ? '📤' : '📦';
  archBtn.onclick = e => {
    e.stopPropagation(); note.archived = !note.archived; note.updatedAt = Date.now();
    save(); renderAll(); toast(note.archived ? 'Nota archivada' : 'Nota restaurada');
  };
  acts.append(pinBtn, archBtn); footer.append(left, acts); card.appendChild(footer);
  card.onclick = () => openModal(note.id);
  return card;
}

// ═══════════════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════════════
function renderAll() {
  const calPanel    = document.getElementById('calendarPanel');
  const dayHeader   = document.getElementById('dayHeader');
  const qcWrap      = document.getElementById('qcWrap');
  const catsBar     = document.getElementById('catsBar');
  const pinnedSection = document.getElementById('pinnedSection');
  const pinnedGrid  = document.getElementById('pinnedGrid');
  const mainGrid    = document.getElementById('mainGrid');
  const emptyState  = document.getElementById('emptyState');

  // ── Calendar: no day selected → show calendar, hide everything else
  if (tab === 'calendar' && !calSelectedDay) {
    calPanel.style.display = 'block';
    dayHeader.style.display = 'none';
    qcWrap.style.display = 'none';
    catsBar.style.display = 'none';
    pinnedSection.style.display = 'none';
    mainGrid.innerHTML = '';
    emptyState.style.display = 'none';
    renderCalendar();
    return;
  }

  // ── Calendar: day selected → show back header + notes
  calPanel.style.display = 'none';
  if (tab === 'calendar' && calSelectedDay) {
    dayHeader.style.display = 'flex';
    document.getElementById('dayHeaderTitle').textContent = fmtDayLong(calSelectedDay);
    qcWrap.style.display = '';
    catsBar.style.display = 'none';
  } else {
    dayHeader.style.display = 'none';
    qcWrap.style.display = '';
    catsBar.style.display = '';
  }

  // ── Category chips (only for non-calendar tabs)
  if (tab !== 'calendar') {
    catsBar.innerHTML = '';
    const allChip = document.createElement('button');
    allChip.className = 'cat-chip' + (cat === 'all' ? ' active' : '');
    allChip.textContent = '✨ Todas';
    allChip.onclick = () => { cat = 'all'; renderAll(); };
    catsBar.appendChild(allChip);
    CATS.forEach(e => {
      const b = document.createElement('button');
      b.className = 'cat-chip' + (cat === e ? ' active' : '');
      b.textContent = e;
      b.onclick = () => { cat = cat === e ? 'all' : e; renderAll(); };
      catsBar.appendChild(b);
    });
  }

  // ── Notes
  const all    = filtered();
  const pinned = all.filter(n => n.pinned && sort !== 'pinned');
  const others = sort === 'pinned' ? all : all.filter(n => !n.pinned);

  pinnedGrid.innerHTML = ''; mainGrid.innerHTML = '';

  if (all.length === 0) {
    emptyState.style.display = 'block';
    pinnedSection.style.display = 'none';
    const isToday = tab === 'today';
    document.getElementById('emptyEmoji').textContent  = isToday ? '🌅' : '📝';
    document.getElementById('emptyTitle').textContent  = isToday ? 'Sin notas hoy' : 'Sin notas todavía';
    document.getElementById('emptyMsg').textContent    = isToday ? 'Crea tu primera nota del día 👆' : 'Toca arriba o el botón + para empezar';
    return;
  }
  emptyState.style.display = 'none';

  if (pinned.length > 0) {
    pinnedSection.style.display = 'block';
    document.getElementById('othersLabel').style.display = others.length ? 'block' : 'none';
    pinned.forEach(n => pinnedGrid.appendChild(buildCard(n)));
  } else {
    pinnedSection.style.display = 'none';
  }
  others.forEach(n => mainGrid.appendChild(buildCard(n)));
}

// ═══════════════════════════════════════════════════════════
// CALENDAR RENDER
// ═══════════════════════════════════════════════════════════
function renderCalendar() {
  const panel = document.getElementById('calendarPanel');
  panel.innerHTML = '';
  if (calViewMode === 'month') renderMonthCal(panel);
  else renderWeekCal(panel);
}

function calHeader(panel, titleText, onPrev, onNext) {
  const hdr = document.createElement('div'); hdr.className = 'cal-header';
  const prev = document.createElement('button'); prev.className = 'cal-nav-btn'; prev.textContent = '‹'; prev.onclick = onPrev;
  const title = document.createElement('div'); title.className = 'cal-title'; title.textContent = titleText;
  const next = document.createElement('button'); next.className = 'cal-nav-btn'; next.textContent = '›'; next.onclick = onNext;
  const toggle = document.createElement('div'); toggle.className = 'cal-view-toggle';
  [{v:'month',l:'Mes'},{v:'week',l:'Sem'}].forEach(({v,l}) => {
    const b = document.createElement('button');
    b.className = 'cal-view-btn' + (calViewMode === v ? ' active' : '');
    b.textContent = l;
    b.onclick = () => { calViewMode = v; renderCalendar(); };
    toggle.appendChild(b);
  });
  hdr.append(prev, title, next, toggle);
  panel.appendChild(hdr);
}

function renderMonthCal(panel) {
  const year  = calDate.getFullYear();
  const month = calDate.getMonth();
  const titleText = `${MONTH_NAMES[month]} ${year}`;

  calHeader(panel, titleText,
    () => { calDate = new Date(year, month - 1, 1); renderCalendar(); },
    () => { calDate = new Date(year, month + 1, 1); renderCalendar(); }
  );

  // Day-of-week labels (Monday first)
  const dow = document.createElement('div'); dow.className = 'cal-dow';
  ['L','M','X','J','V','S','D'].forEach(d => {
    const c = document.createElement('div'); c.className = 'cal-dow-cell'; c.textContent = d;
    dow.appendChild(c);
  });
  panel.appendChild(dow);

  // Grid
  const grid = document.createElement('div'); grid.className = 'cal-grid';

  const firstDow = new Date(year, month, 1).getDay(); // 0=Sun
  const offset   = firstDow === 0 ? 6 : firstDow - 1; // Monday-based offset
  const daysInM  = new Date(year, month + 1, 0).getDate();
  const daysInPM = new Date(year, month, 0).getDate();
  const todayKey = toDateKey(Date.now());

  // Prev month filler
  for (let i = offset - 1; i >= 0; i--) {
    const c = document.createElement('div');
    c.className = 'cal-day other-month';
    c.innerHTML = `<span class="cal-day-num">${daysInPM - i}</span>`;
    grid.appendChild(c);
  }

  // Current month
  for (let d = 1; d <= daysInM; d++) {
    const dateKey   = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayNotes  = notesOnDay(dateKey);
    const isToday   = dateKey === todayKey;

    const cell = document.createElement('div');
    cell.className = 'cal-day' + (isToday ? ' today' : '') + (dayNotes.length ? ' has-notes' : '');

    const num = document.createElement('span'); num.className = 'cal-day-num'; num.textContent = d;
    cell.appendChild(num);

    if (dayNotes.length) {
      const dots = document.createElement('div'); dots.className = 'cal-dots';
      dayNotes.slice(0, 3).forEach(n => {
        const dot = document.createElement('span');
        dot.className = `cal-dot nc-${n.color || 'default'}`;
        dots.appendChild(dot);
      });
      if (dayNotes.length > 3) {
        const more = document.createElement('span');
        more.className = 'cal-dot-more'; more.textContent = `+${dayNotes.length-3}`;
        dots.appendChild(more);
      }
      cell.appendChild(dots);
    }

    if (dayNotes.length > 0 || true) { // allow clicking any day
      cell.onclick = () => { calSelectedDay = dateKey; renderAll(); };
    }
    grid.appendChild(cell);
  }

  // Next month filler
  const total = Math.ceil((offset + daysInM) / 7) * 7;
  for (let d = 1; d <= total - offset - daysInM; d++) {
    const c = document.createElement('div');
    c.className = 'cal-day other-month';
    c.innerHTML = `<span class="cal-day-num">${d}</span>`;
    grid.appendChild(c);
  }

  panel.appendChild(grid);
}

function renderWeekCal(panel) {
  // Find Monday of calDate's week
  const ref    = new Date(calDate);
  const dow    = ref.getDay();
  const diff   = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(ref); monday.setDate(ref.getDate() + diff);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);

  const fmtShort = d => d.toLocaleDateString('es', {day:'numeric', month:'short'});
  const titleText = `${fmtShort(monday)} – ${fmtShort(sunday)} ${sunday.getFullYear()}`;

  calHeader(panel, titleText,
    () => { calDate = new Date(calDate); calDate.setDate(calDate.getDate()-7); renderCalendar(); },
    () => { calDate = new Date(calDate); calDate.setDate(calDate.getDate()+7); renderCalendar(); }
  );

  const weekGrid = document.createElement('div'); weekGrid.className = 'cal-week-grid';
  const dayLabels = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const todayKey  = toDateKey(Date.now());

  for (let i = 0; i < 7; i++) {
    const day     = new Date(monday); day.setDate(monday.getDate() + i);
    const dateKey = toDateKey(day.getTime());
    const dn      = notesOnDay(dateKey);
    const isToday = dateKey === todayKey;

    const cell = document.createElement('div');
    cell.className = 'cal-week-day' + (isToday ? ' today' : '') + (dn.length ? ' has-notes' : '');

    const head = document.createElement('div'); head.className = 'cal-week-head';
    const dname = document.createElement('span'); dname.className = 'cal-week-dname'; dname.textContent = dayLabels[i];
    const dnum  = document.createElement('span'); dnum.className  = 'cal-week-dnum';  dnum.textContent  = day.getDate();
    head.append(dname, dnum); cell.appendChild(head);

    if (dn.length) {
      const preview = document.createElement('div'); preview.className = 'cal-week-notes';
      dn.slice(0, 3).forEach(n => {
        const pill = document.createElement('div');
        pill.className = `cal-note-pill nc-${n.color || 'default'}`;
        pill.textContent = (n.title || n.content || n.items?.[0]?.text || '—').slice(0, 18);
        preview.appendChild(pill);
      });
      if (dn.length > 3) {
        const more = document.createElement('div');
        more.className = 'cal-week-more'; more.textContent = `+${dn.length-3} más`;
        preview.appendChild(more);
      }
      cell.appendChild(preview);
    }

    cell.onclick = () => {
      calSelectedDay = dateKey;
      calDate = new Date(day);
      renderAll();
    };
    weekGrid.appendChild(cell);
  }
  panel.appendChild(weekGrid);
}

// ═══════════════════════════════════════════════════════════
// QUICK CREATE
// ═══════════════════════════════════════════════════════════
function initQc() {
  buildColorDots(document.getElementById('qcColors'), qcColor, id => {
    qcColor = id; refreshQcColorDots();
    document.getElementById('qcWrap').className = `qc-wrap nc-${qcColor}`;
  });
  buildCatEmojis(document.getElementById('qcCats'), qcCat, e => {
    qcCat = e; buildCatEmojis(document.getElementById('qcCats'), qcCat, arguments.callee);
  });
  renderQcContent();

  document.getElementById('qcPlaceholder').onclick = e => {
    if (e.target.id === 'voiceMicBtn') return;
    const start = e.target.closest('[data-start]')?.dataset.start;
    if (start) qcType = start;
    openQc();
  };
  document.getElementById('qcTypeToggle').onclick = () => {
    qcType = qcType === 'text' ? 'checklist' : 'text';
    document.getElementById('qcTypeToggle').textContent = qcType === 'checklist' ? '📝 Texto' : '☑️ Lista';
    qcItems = [{text:'', checked:false}];
    renderQcContent();
  };
  document.getElementById('qcSaveBtn').onclick = saveQcNote;

  document.addEventListener('click', e => {
    if (!document.getElementById('qcWrap').contains(e.target)) saveQcNote(true);
  });
}

function refreshQcColorDots() {
  buildColorDots(document.getElementById('qcColors'), qcColor, id => {
    qcColor = id; refreshQcColorDots();
    document.getElementById('qcWrap').className = `qc-wrap nc-${qcColor}`;
  });
}

function renderQcContent() {
  const cnt = document.getElementById('qcContent'); cnt.innerHTML = '';
  if (qcType === 'text') {
    const ta = document.createElement('textarea');
    ta.className = 'qc-body-input'; ta.id = 'qcBody'; ta.placeholder = 'Escribe algo...'; ta.rows = 3;
    cnt.appendChild(ta);
  } else {
    const div = document.createElement('div'); div.className = 'qc-checklist'; div.id = 'qcChecklist';
    buildChecklist(div, qcItems); cnt.appendChild(div);
  }
}

function openQc() {
  document.getElementById('qcPlaceholder').style.display = 'none';
  document.getElementById('qcForm').classList.add('open');
  document.getElementById('qcTypeToggle').textContent = qcType === 'checklist' ? '📝 Texto' : '☑️ Lista';
  setTimeout(() => {
    if (qcType === 'text') document.getElementById('qcBody')?.focus();
    else document.querySelector('#qcChecklist .item-input')?.focus();
  }, 50);
}

function closeQc() {
  document.getElementById('qcPlaceholder').style.display = '';
  document.getElementById('qcForm').classList.remove('open');
  document.getElementById('qcTitle').value = '';
  qcType = 'text'; qcColor = 'default'; qcCat = '📝';
  qcItems = [{text:'', checked:false}];
  document.getElementById('qcWrap').className = 'qc-wrap';
  refreshQcColorDots();
  buildCatEmojis(document.getElementById('qcCats'), qcCat, e => {
    qcCat = e; buildCatEmojis(document.getElementById('qcCats'), qcCat, arguments.callee);
  });
  renderQcContent();
}

function saveQcNote(auto = false) {
  if (!document.getElementById('qcForm').classList.contains('open')) return;
  const title = document.getElementById('qcTitle').value.trim();
  let content = '', items = [];
  if (qcType === 'text') content = document.getElementById('qcBody')?.value?.trim() || '';
  else items = qcItems.filter(i => i.text.trim());

  if (!title && !content && !items.length) { if (!auto) toast('Escribe algo primero'); closeQc(); return; }

  notes.unshift({
    id: uid(), type: qcType, title, content,
    items: items.map(i => ({...i})),
    color: qcColor, cat: qcCat,
    pinned: false, archived: false,
    createdAt: Date.now(), updatedAt: Date.now(),
  });
  save(); renderAll(); closeQc();
  toast('Nota creada ✓');
}

// ═══════════════════════════════════════════════════════════
// VOICE
// ═══════════════════════════════════════════════════════════
function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;

  const micBtn = document.getElementById('voiceMicBtn');
  micBtn.style.display = 'inline-flex';

  recognition = new SR();
  recognition.lang = 'es-ES';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = e => {
    let finalChunk = '';
    let interimChunk = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalChunk += e.results[i][0].transcript;
      else interimChunk += e.results[i][0].transcript;
    }
    if (finalChunk) voiceAccumulated += finalChunk + ' ';
    const ta = document.getElementById('qcBody');
    if (ta) ta.value = (voiceAccumulated + interimChunk).trim();

    clearTimeout(voiceSilenceTimer);
    voiceSilenceTimer = setTimeout(() => stopVoice(true), 2000);
  };

  recognition.onerror = e => {
    if (e.error !== 'no-speech') stopVoice(false);
  };

  recognition.onend = () => {
    if (voiceActive) { try { recognition.start(); } catch {} }
  };

  micBtn.onclick = e => {
    e.stopPropagation();
    voiceActive ? stopVoice(true) : startVoice();
  };
}

function startVoice() {
  if (!recognition) return;
  voiceActive = true; voiceAccumulated = '';
  if (!document.getElementById('qcForm').classList.contains('open')) {
    qcType = 'text'; openQc();
  }
  const micBtn = document.getElementById('voiceMicBtn');
  micBtn.classList.add('recording'); micBtn.textContent = '⏹';
  const ta = document.getElementById('qcBody');
  if (ta) { ta.value = ''; ta.placeholder = '🎤 Escuchando...'; }
  try { recognition.start(); } catch {}
  toast('🎤 Habla ahora — para al terminar');
}

function stopVoice(doSave) {
  if (!recognition) return;
  voiceActive = false;
  clearTimeout(voiceSilenceTimer);
  try { recognition.stop(); } catch {}
  const micBtn = document.getElementById('voiceMicBtn');
  micBtn.classList.remove('recording'); micBtn.textContent = '🎤';
  const ta = document.getElementById('qcBody');
  if (ta) ta.placeholder = 'Escribe algo...';
  if (doSave && (voiceAccumulated.trim() || ta?.value?.trim())) {
    setTimeout(saveQcNote, 100);
  }
}

// ═══════════════════════════════════════════════════════════
// EDIT MODAL
// ═══════════════════════════════════════════════════════════
function initModal() {
  document.getElementById('overlay').onclick = e => {
    if (e.target === document.getElementById('overlay')) closeModal(true);
  };
  document.getElementById('modalPinBtn').onclick = () => {
    mPinned = !mPinned;
    document.getElementById('modalPinBtn').classList.toggle('on', mPinned);
  };
  document.getElementById('modalSaveBtn').onclick = () => closeModal(true);
  document.getElementById('modalDelBtn').onclick   = deleteNote;
  document.getElementById('modalArchBtn').onclick  = archiveNote;
}

function openModal(id) {
  const note = notes.find(n => n.id === id);
  if (!note) return;
  editId = id; mType = note.type; mColor = note.color || 'default';
  mCat = note.cat || '📝'; mPinned = note.pinned;
  mItems = (note.items || []).map(i => ({...i}));

  document.getElementById('modalTitle').value = note.title || '';
  document.getElementById('modalPinBtn').classList.toggle('on', mPinned);
  document.getElementById('modalArchBtn').textContent = note.archived ? '📤 Restaurar' : '📦 Archivar';

  const modal = document.getElementById('modal');
  modal.className = `modal nc-${mColor}`;

  renderModalBody();
  buildColorDots(document.getElementById('modalColors'), mColor, id => {
    mColor = id; modal.className = `modal nc-${mColor}`;
    buildColorDots(document.getElementById('modalColors'), mColor, arguments.callee);
  });
  buildCatEmojis(document.getElementById('modalCats'), mCat, e => {
    mCat = e; buildCatEmojis(document.getElementById('modalCats'), mCat, arguments.callee);
  });
  document.getElementById('overlay').classList.add('open');
}

function renderModalBody() {
  const body = document.getElementById('modalBody'); body.innerHTML = '';
  const note = notes.find(n => n.id === editId); if (!note) return;
  if (mType === 'text') {
    const ta = document.createElement('textarea');
    ta.className = 'modal-textarea'; ta.id = 'modalTextarea';
    ta.placeholder = 'Escribe algo...'; ta.value = note.content || '';
    body.appendChild(ta); setTimeout(() => ta.focus(), 50);
  } else {
    const div = document.createElement('div');
    div.className = 'modal-checklist'; div.id = 'modalChecklist';
    if (!mItems.length) mItems = [{text:'', checked:false}];
    buildChecklist(div, mItems); body.appendChild(div);
  }
}

function closeModal(doSave) {
  const note = notes.find(n => n.id === editId);
  if (doSave && note) {
    note.title  = document.getElementById('modalTitle').value.trim();
    note.color  = mColor; note.cat = mCat; note.pinned = mPinned;
    if (mType === 'text') note.content = document.getElementById('modalTextarea')?.value?.trim() || '';
    else note.items = mItems.filter(i => i.text.trim());
    note.updatedAt = Date.now();
    save(); renderAll();
  }
  document.getElementById('overlay').classList.remove('open');
  editId = null;
}

function deleteNote() {
  if (!editId) return;
  notes = notes.filter(n => n.id !== editId);
  save(); renderAll();
  document.getElementById('overlay').classList.remove('open');
  editId = null;
  toast('Nota eliminada 🗑');
}

function archiveNote() {
  const note = notes.find(n => n.id === editId); if (!note) return;
  note.archived = !note.archived; note.updatedAt = Date.now();
  const archived = note.archived;
  closeModal(true);
  toast(archived ? 'Nota archivada 📦' : 'Nota restaurada 📤');
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2600);
}

// ═══════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════
function initControls() {
  const si = document.getElementById('searchInput');
  si.addEventListener('input', () => renderAll());
  document.getElementById('searchClear').onclick = () => { si.value = ''; renderAll(); si.focus(); };

  document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
      const newTab = t.dataset.tab;
      if (newTab === 'calendar') calSelectedDay = null; // always go to calendar overview
      tab = newTab;
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      renderAll();
    };
  });

  // Back from day to calendar
  document.getElementById('dayBackBtn').onclick = () => {
    calSelectedDay = null;
    renderAll();
  };

  const sortBtn  = document.getElementById('sortBtn');
  const sortMenu = document.getElementById('sortMenu');
  const sortLabels = { updatedAt:'Recientes', createdAt:'Creación', color:'Color', pinned:'Fijadas' };
  sortBtn.onclick = e => { e.stopPropagation(); sortMenu.classList.toggle('open'); };
  document.addEventListener('click', () => sortMenu.classList.remove('open'));
  sortMenu.querySelectorAll('.sort-item').forEach(it => {
    it.onclick = () => {
      sort = it.dataset.sort;
      document.getElementById('sortLabel').textContent = sortLabels[sort];
      sortMenu.querySelectorAll('.sort-item').forEach(x => x.classList.remove('active'));
      it.classList.add('active');
      sortMenu.classList.remove('open');
      renderAll();
    };
  });

  document.getElementById('fabBtn').onclick = () => {
    if (tab === 'calendar' && !calSelectedDay) {
      // In calendar view, go to today's notes
      calSelectedDay = toDateKey(Date.now()); renderAll();
    } else {
      window.scrollTo({top: 0, behavior: 'smooth'});
      setTimeout(openQc, 200);
    }
  };
}
